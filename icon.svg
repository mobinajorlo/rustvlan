<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#ea580c" stroke-width="8"/>
  
  <!-- Outer glowing dashed ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ea580c" stroke-width="4" stroke-dasharray="12 18" opacity="0.5"/>
  
  <!-- Secure Shield & Network Node inside -->
  <g transform="translate(156, 126)">
    <!-- Elegant Orange Shield Shape -->
    <path d="M100 0 L200 40 V130 C200 200 100 240 100 240 C100 240 0 200 0 130 V40 Z" fill="url(#shieldGrad)" filter="drop-shadow(0px 6px 10px rgba(0,0,0,0.30))" />
    
    <!-- Central White Connecting Orb Nodes -->
    <circle cx="100" cy="75" r="16" fill="#ffffff" />
    <circle cx="50" cy="140" r="13" fill="#ffffff" opacity="0.9" />
    <circle cx="150" cy="140" r="13" fill="#ffffff" opacity="0.9" />
    <circle cx="100" cy="175" r="11" fill="#ffffff" opacity="0.8" />
    
    <!-- High contrast Connection Bridges/Wires -->
    <line x1="100" y1="75" x2="50" y2="140" stroke="#ffffff" stroke-width="4.5" opacity="0.85"/>
    <line x1="100" y1="75" x2="150" y2="140" stroke="#ffffff" stroke-width="4.5" opacity="0.85"/>
    <line x1="50" y1="140" x2="100" y2="175" stroke="#ffffff" stroke-width="4.5" opacity="0.85"/>
    <line x1="150" y1="140" x2="100" y2="175" stroke="#ffffff" stroke-width="4.5" opacity="0.85"/>
  </g>
</svg>
